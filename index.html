        // ============================================================
        
        // ── Global variables ──────────────────────────────────────────
        var defaultSelections = [0, 1];
        var cardSelections = loadSelections();
        var editingCardSlot = null;
        var statSelected = "status1";
        var streamError = false;
        var sleepFadeInterval = null;
        var sleepSecondsLeft = 0;
        var sleepCountdownInterval = null;
        var lastPlayTime = 0;
        var stallTimeout = null;
        
        // On load: render cards then autoplay last played slot
        renderCards();
        var lastSlot = parseInt(localStorage.getItem("lastPlayingSlot") || "0");
        var lastCardId = "card" + (lastSlot + 1);
        playStream(lastSlot, lastCardId);
        
        
        // ── Load / Save ───────────────────────────────────────────────
        
        function loadSelections() {
            var saved = localStorage.getItem("cardSelections");
            if (saved) return JSON.parse(saved);
            return defaultSelections.slice();
        }
        
        function saveSelections() {
            localStorage.setItem("cardSelections", JSON.stringify(cardSelections));
        }
        
        
        // ── Render cards ──────────────────────────────────────────────
        
        function renderCards() {
            for (var slot = 0; slot < 2; slot++) {
                var s = stations[cardSelections[slot]];
                var num = slot + 1;
                document.getElementById("freq" + num).innerText = s.freq + " " + s.name;
                document.getElementById("tagline" + num).innerText = s.tagline;
            }
        }
        
        
        // ── Play by slot ──────────────────────────────────────────────
        
        function playStream(slot, cardId) {
            streamError = false;
            var player = document.getElementById("globalPlayer");
            var btn = document.getElementById("masterPauseBtn");
            var s = stations[cardSelections[slot]];
        
            statSelected = "status" + (slot + 1);
        
            document.getElementById("card1").classList.remove("active");
            document.getElementById("card2").classList.remove("active");
            document.getElementById("status1").style.color = "#aaaaaa";
            document.getElementById("status1").innerText = "Click to Play";
            document.getElementById("status2").style.color = "#aaaaaa";
            document.getElementById("status2").innerText = "Click to Play";
        
            document.getElementById(cardId).classList.add("active");
            document.getElementById(statSelected).style.color = "#0084ff";
            document.getElementById(statSelected).innerText = "● Now Playing";
        
            player.removeEventListener("error", handleStreamError);
            player.addEventListener("error", handleStreamError);

            player.removeEventListener("stalled", handleStreamStall);
            player.removeEventListener("waiting", handleStreamStall);
            
            // Only listen for stalls after stream starts playing
            player.addEventListener("playing", function onFirstPlay() {
                player.removeEventListener("playing", onFirstPlay);
                player.addEventListener("stalled", handleStreamStall);
                player.addEventListener("waiting", handleStreamStall);
            });
        
            player.src = s.url;
            player.load();
            player.play();
        
            btn.innerHTML = '<div class="pause-icon"><div class="bar"></div><div class="bar"></div></div>';
            btn.style.background = "#ff3b30";
            btn.style.boxShadow = "0 4px 12px rgba(255, 59, 48, 0.3)";
        
            localStorage.setItem("lastPlayingSlot", slot);
        
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.freq + " " + s.name,
                    artist: s.tagline,
                    album: "Radio Player by the Gonzales"
                });
            }
        }
        
        
        // ── Toggle playback ───────────────────────────────────────────
        
        function togglePlayback() {
            if (streamError) return;
            var player = document.getElementById("globalPlayer");
            var btn = document.getElementById("masterPauseBtn");
        
            if (player.paused) {
                player.play();
                btn.innerHTML = '<div class="pause-icon"><div class="bar"></div><div class="bar"></div></div>';
                btn.style.background = "#ff3b30";
                btn.style.boxShadow = "0 4px 12px rgba(255, 59, 48, 0.3)";
                document.getElementById(statSelected).innerText = "● Now Playing";
            } else {
                player.pause();
                btn.innerHTML = '<div class="play-icon"></div>';
                btn.style.background = "#34c759";
                btn.style.boxShadow = "0 4px 12px rgba(52, 199, 89, 0.3)";
                document.getElementById(statSelected).innerText = "● Paused";
            }
        }
        
        
        // ── Native player events ──────────────────────────────────────
        
        function handleNativePlay() {
            lastPlayTime = Date.now();
            clearTimeout(stallTimeout);
            stallTimeout = null;
            var btn = document.getElementById("masterPauseBtn");
            btn.innerHTML = '<div class="pause-icon"><div class="bar"></div><div class="bar"></div></div>';
            btn.style.background = "#ff3b30";
            btn.style.boxShadow = "0 4px 12px rgba(255, 59, 48, 0.3)";
            document.getElementById(statSelected).style.color = "#0084ff";
            document.getElementById(statSelected).innerText = "● Now Playing";
        }
        
        function handleNativePause() {
            if (streamError) return;
            var btn = document.getElementById("masterPauseBtn");
            btn.innerHTML = '<div class="play-icon"></div>';
            btn.style.background = "#34c759";
            btn.style.boxShadow = "0 4px 12px rgba(52, 199, 89, 0.3)";
            document.getElementById(statSelected).innerText = "● Paused";
        }
        
        function handleStreamError() {
            streamError = true;
            var btn = document.getElementById("masterPauseBtn");
            btn.innerHTML = '<div class="play-icon"></div>';
            btn.style.background = "#34c759";
            btn.style.boxShadow = "0 4px 12px rgba(52, 199, 89, 0.3)";
            document.getElementById(statSelected).style.color = "#ff3b30";
            document.getElementById(statSelected).innerText = "⚠ Stream Unavailable";
        }
        
        
        // ── Station modal ─────────────────────────────────────────────
        
        function openModal(slot, event) {
            event.stopPropagation();
            editingCardSlot = slot;
        
            var currentIndex = cardSelections[slot];
            var otherIndex = cardSelections[slot === 0 ? 1 : 0];
        
            var indexed = stations.map(function(s, i) { return { s: s, i: i }; });
            indexed.sort(function(a, b) { return parseFloat(a.s.freq) - parseFloat(b.s.freq); });
        
            var list = document.getElementById("stationList");
            list.innerHTML = "";
        
            for (var j = 0; j < indexed.length; j++) {
                var s = indexed[j].s;
                var i = indexed[j].i;
        
                if (i === otherIndex) continue;
        
                var isSelected = (i === currentIndex);
                var div = document.createElement("div");
                div.className = "station-option" + (isSelected ? " selected" : "");
                div.innerHTML =
                    '<span class="freq">' + s.freq + ' ' + s.name + '</span>' +
                    '<span class="tagline">' + s.tagline + '</span>';
                div.setAttribute("data-index", i);
                div.onclick = selectStation;
                list.appendChild(div);
            }
            document.getElementById("stationSearch").value = "";
            document.getElementById("modalOverlay").classList.add("open");
        }
        
        function selectStation() {
            var index = parseInt(this.getAttribute("data-index"));
            var slot = editingCardSlot;
            cardSelections[slot] = index;
            saveSelections();
            renderCards();
            playStream(slot, "card" + (slot + 1));
            closeModal();
        }
        
        function closeModal() {
            document.getElementById("modalOverlay").classList.remove("open");
            editingCardSlot = null;
        }
        
        function filterStations() {
            var query = document.getElementById("stationSearch").value.toLowerCase();
            var options = document.querySelectorAll(".station-option");
            options.forEach(function(option) {
                var text = option.innerText.toLowerCase();
                option.style.display = text.includes(query) ? "flex" : "none";
            });
        }
        
        
        // ── Sleep timer ───────────────────────────────────────────────
        
        function handleTimerBtnClick() {
            if (sleepCountdownInterval) {
                cancelTimer();
            } else {
                openTimerModal();
            }
        }
        
        function openTimerModal() {
            document.getElementById("timerHours").value = "0";
            document.getElementById("timerMinutes").value = "0";
            document.getElementById("timerSetBtn").disabled = true;
            document.getElementById("timerModalOverlay").classList.add("open");
        }
        
        function closeTimerModal() {
            document.getElementById("timerModalOverlay").classList.remove("open");
        }
        
        function checkTimerInputs() {
            var hours = parseInt(document.getElementById("timerHours").value);
            var minutes = parseInt(document.getElementById("timerMinutes").value);
            document.getElementById("timerSetBtn").disabled = (hours === 0 && minutes === 0);
        }
        
        function applyCustomTimer() {
            var hours = parseInt(document.getElementById("timerHours").value);
            var minutes = parseInt(document.getElementById("timerMinutes").value);
            var totalSeconds = (hours * 3600) + (minutes * 60);
            if (totalSeconds <= 0) {
                alert("Please select at least 1 minute.");
                return;
            }
            closeTimerModal();
            startSleepTimer(totalSeconds);
        }
        
        function startSleepTimer(seconds) {
            resetTimer();
            sleepSecondsLeft = seconds;
            updateTimerBtn();
        
            sleepCountdownInterval = setInterval(function() {
                sleepSecondsLeft--;
                updateTimerBtn();
                if (sleepSecondsLeft === 30) startFadeOut();
                if (sleepSecondsLeft <= 0) timerExpired();
            }, 1000);
        }
        
        function updateTimerBtn() {
            var h = Math.floor(sleepSecondsLeft / 3600);
            var m = Math.floor((sleepSecondsLeft % 3600) / 60);
            var s = sleepSecondsLeft % 60;
            var display = "";
            if (h > 0) display += h + "h ";
            display += (m < 10 && h > 0 ? "0" : "") + m + "m ";
            display += (s < 10 ? "0" : "") + s + "s";
            var btn = document.getElementById("sleepTimerBtn");
            btn.innerText = "⏱ " + display.trim() + " — Tap to Cancel";
            btn.classList.add("active");
        }
        
        function startFadeOut() {
            var player = document.getElementById("globalPlayer");
            var steps = 30;
            var stepSize = player.volume / steps;
            sleepFadeInterval = setInterval(function() {
                if (player.volume > stepSize) {
                    player.volume = Math.max(0, player.volume - stepSize);
                } else {
                    player.volume = 0;
                    clearInterval(sleepFadeInterval);
                }
            }, 1000);
        }
        
        function resetTimer() {
            clearInterval(sleepCountdownInterval);
            clearInterval(sleepFadeInterval);
            sleepCountdownInterval = null;
            sleepFadeInterval = null;
            sleepSecondsLeft = 0;
            var player = document.getElementById("globalPlayer");
            player.volume = 1;
            var timerBtn = document.getElementById("sleepTimerBtn");
            timerBtn.innerText = "⏱ Sleep Timer";
            timerBtn.classList.remove("active");
        }
        
        function timerExpired() {
            resetTimer();
            var player = document.getElementById("globalPlayer");
            player.pause();
            var btn = document.getElementById("masterPauseBtn");
            btn.innerHTML = '<div class="play-icon"></div>';
            btn.style.background = "#34c759";
            btn.style.boxShadow = "0 4px 12px rgba(52, 199, 89, 0.3)";
            document.getElementById(statSelected).innerText = "● Paused";
        }
        
        function cancelTimer() {
            resetTimer();
        }

        function handleStreamStall() {
            var player = document.getElementById("globalPlayer");
            if (player.paused || streamError) return;
            if (Date.now() - lastPlayTime < 8000) return;
        
            clearTimeout(stallTimeout);
            stallTimeout = setTimeout(function() {
                if (player.paused || streamError) return;
                if (player.readyState >= 3) return;
                document.getElementById(statSelected).style.color = "#f5a623";
                document.getElementById(statSelected).innerText = "⟳ Reconnecting...";
            }, 3000);
        }
        
    </script>

</body>
</html>
